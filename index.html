.filter-bar{display:flex;align-items:center;gap:10px;width:100%;max-width:360px;margin-bottom:14px}

.filter-bar select{flex:1;background:#252a3d;border:1.5px solid rgba(255,255,255,0.15);border-radius:8px;padding:9px 10px;color:#eef0f8;font-family:'DM Mono',monospace;font-size:12px;outline:none}

.centre{width:46px;flex-shrink:0;background:#252a3d;border:1.5px solid rgba(255,255,255,0.15);border-radius:10px;color:#f0a500;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;text-align:center;text-transform:uppercase;outline:none}

.centre::placeholder{color:#4a4f6b}
.btn{display:flex;flex:1;min-width:0;background:#252a3d;border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 16px;text-decoration:none;color:#eef0f8;align-items:center;gap:12px;transition:all .15s}
.btn:hover{border-color:#f0a500;background:rgba(240,165,0,0.06)}
.av{width:38px;height:38px;border-radius:50%;background:#2e3450;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;color:#8890b0;flex-shrink:0}
.cn{font-size:13px;color:#eef0f8;font-weight:500}
.cs{font-size:10px;color:#6b7090;margin-top:3px}
.cs.warn{color:#f0a500}
.cs.danger{color:#e05c5c}
.cs.ok{color:#2dce89}
.loading{color:#6b7090;font-size:11px;text-align:center;padding:20px}
.err{color:#e05c5c;font-size:11px;text-align:center;padding:20px}

// Sépare "NOM PRENOM" -> { prenom, nom } : le dernier mot est considéré
// comme le prénom (compatible avec les prénoms composés écrits avec un tiret).
function firstLast(name) {
  const parts = name.trim().split(/\s+/);
  const prenom = parts[parts.length - 1];
  const nom = parts.slice(0, -1).join(' ');
  return { prenom, nom };
}

function titleCaseWord(w) {
  return w.split('-').map(s => s.charAt(0).toUpperCase() + s.slice(1).toLowerCase()).join('-');
}
function titleCase(str) {
  return str.split(' ').map(titleCaseWord).join(' ');
}

function initials(name) {
  const { prenom, nom } = firstLast(name);
  const nomFirst = nom.split(' ')[0] || '';
  return ((prenom[0] || '') + (nomFirst[0] || '')).toUpperCase();
}

function userKey(n) { return n.replace(/[^a-zA-Z0-9]/g, '_'); }

let CENTRES = {};

function renderList(compagnons) {
  const list = document.getElementById('list');
  if (!compagnons || compagnons.length === 0) {
    list.innerHTML = '<div class="err">Aucun compagnon enregistré</div>';
    return;
  }
  const sorted = compagnons.slice().sort((a, b) => {
    const pa = firstLast(a.name).prenom, pb = firstLast(b.name).prenom;
    return pa.localeCompare(pb, 'fr');
  });
  list.innerHTML = sorted.map(c => {
    const { prenom, nom } = firstLast(c.name);
    const centre = CENTRES[c.slug] || '';
    return `
  <div class="row" data-slug="${c.slug}" data-centre="${centre}">
    <input class="centre" maxlength="4" placeholder="—" value="${centre}" oninput="onCentreInput(this,'${c.slug}')" onchange="onCentreChange(this,'${c.slug}')">
    <a class="btn" href="${c.slug}.html">
      <div class="av">${initials(c.name)}</div>
      <div><div class="cn">${titleCase(prenom)} ${titleCase(nom)}</div><div class="cs" id="cs-${c.slug}">…</div></div>
    </a>
  </div>`;
  }).join('');
}

function onCentreInput(input, slug) {
  const val = input.value.toUpperCase();
  if (input.value !== val) input.value = val;
  const row = input.closest('.row');
  row.dataset.centre = val;
  CENTRES[slug] = val;
  refreshCentreFilterOptions();
  applyFilter();
}

function onCentreChange(input, slug) {
  const val = input.value.trim().toUpperCase();
  if (db) {
    db.ref('config/centres/' + slug).set(val).catch(() => {});
  }
}

function refreshCentreFilterOptions() {
  const sel = document.getElementById('centreFilter');
  if (!sel) return;
  const current = sel.value;
  const values = Array.from(new Set(Object.values(CENTRES).filter(Boolean))).sort((a, b) => a.localeCompare(b, 'fr'));
  sel.innerHTML = '<option value="">Tous</option>' + values.map(v => `<option value="${v}">${v}</option>`).join('');
  if (values.includes(current)) sel.value = current;
}

function applyFilter() {
  const sel = document.getElementById('centreFilter');
  const val = sel ? sel.value : '';
  document.querySelectorAll('.row').forEach(row => {
    const show = !val || row.dataset.centre === val;
    row.classList.toggle('filtered-out', !show);
  });
}

// Calcule le nombre de matins/après-midis non saisis ce mois-ci
// (jours ouvrés du 1er à aujourd'hui, hors jours fériés déclarés _FERIE)
function missingCounts(saisies) {
  const now = new Date();
  let manqueMatin = 0, manqueApm = 0;
  for (let d = 1; d <= now.getDate(); d++) {
    const date = new Date(now.getFullYear(), now.getMonth(), d);
    const jourIdx = date.getDay();
    if (jourIdx === 0 || jourIdx === 6) continue;
    const iso = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const s = saisies[iso];
    const ferieMatin = s && s.matin === '_FERIE';
    const ferieApm = s && s.apm === '_FERIE';
    if (!ferieMatin && (!s || !s.matin)) manqueMatin++;
    if (!ferieApm && (!s || !s.apm)) manqueApm++;
  }
  return { manqueMatin, manqueApm };
}

let db;

async function loadMissing(c) {
  const el = document.getElementById('cs-' + c.slug);
  if (!el || !db) return;
  try {
    const snap = await db.ref('saisies/' + userKey(c.name)).once('value');
    const saisies = snap.exists() ? snap.val() : {};
    const { manqueMatin, manqueApm } = missingCounts(saisies);
    const total = manqueMatin + manqueApm;
    if (total === 0) {
      el.textContent = '✓ à jour';
      el.className = 'cs ok';
    } else {
      const parts = [];
      if (manqueMatin > 0) parts.push(manqueMatin + ' matin' + (manqueMatin > 1 ? 's' : ''));
      if (manqueApm > 0) parts.push(manqueApm + ' après-midi' + (manqueApm > 1 ? 's' : ''));
      el.textContent = parts.join(' · ') + ' à compléter';
      el.className = 'cs ' + (total > 10 ? 'danger' : 'warn');
    }
  } catch (e) {
    el.textContent = '';
  }
}

async function initFirebase() {
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
  } catch (e) {
    return;
  }
  try {
    const snap = await db.ref('config/centres').once('value');
    if (snap.exists()) CENTRES = snap.val() || {};
  } catch (e) {}
  renderList(COMPAGNONS);
  refreshCentreFilterOptions();
  COMPAGNONS.forEach(loadMissing);
}

renderList(COMPAGNONS);
initFirebase();
