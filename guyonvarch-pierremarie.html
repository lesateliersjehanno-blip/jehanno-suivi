<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi Temps JEHANNO</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1c2033;color:#eef0f8;font-family:'DM Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.logo{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#f0a500;margin-bottom:6px;text-align:center}
.sub{font-size:11px;color:#6b7090;letter-spacing:2px;text-transform:uppercase;margin-bottom:40px;text-align:center}
.label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#6b7090;margin-bottom:12px}
.list{display:flex;flex-direction:column;gap:10px;width:100%;max-width:360px}
.btn{display:flex;background:#252a3d;border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 16px;text-decoration:none;color:#eef0f8;align-items:center;gap:12px;transition:all .15s}
.btn:hover{border-color:#f0a500;background:rgba(240,165,0,0.06)}
.av{width:38px;height:38px;border-radius:50%;background:#2e3450;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;color:#8890b0;flex-shrink:0}
.cn{font-size:13px;color:#eef0f8;font-weight:500}
.cs{font-size:10px;color:#6b7090;margin-top:2px;letter-spacing:.5px}
</style>
</head>
<body>
<div class="logo">⚒ JEHANNO</div>
<div class="sub">Suivi Temps — Accès compagnons</div>
<div class="label">Sélectionnez votre nom</div>
<div class="list">
  <a class="btn" href="/allanic-patrice.html">
    <div class="av">AP</div>
    <div><div class="cn">Allanic</div><div class="cs">Patrice</div></div>
  </a>
  <a class="btn" href="/guyonvarch-pierremarie.html">
    <div class="av">GP</div>
    <div><div class="cn">Guyonvarch</div><div class="cs">Pierre-marie</div></div>
  </a>
  <a class="btn" href="/le-bidre-elise.html">
    <div class="av">LB</div>
    <div><div class="cn">Le</div><div class="cs">Bidre Elise</div></div>
  </a>
  <a class="btn" href="/le-roux-pierreyves.html">
    <div class="av">LR</div>
    <div><div class="cn">Le</div><div class="cs">Roux Pierre-yves</div></div>
  </a>
  <a class="btn" href="/lair-florian.html">
    <div class="av">LF</div>
    <div><div class="cn">Lair</div><div class="cs">Florian</div></div>
  </a>
</div>
</body>
